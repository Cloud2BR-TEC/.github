<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Technology Education Center by Cloud2BR">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e88ff"/>
      <stop offset="1" stop-color="#0a4fd6"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dceaff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#04266b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#sky)"/>

  <!-- decorative clouds -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="180" cy="70" r="34"/>
    <circle cx="230" cy="70" r="44"/>
    <circle cx="290" cy="75" r="30"/>
    <circle cx="980" cy="300" r="40"/>
    <circle cx="1035" cy="300" r="52"/>
    <circle cx="1090" cy="305" r="34"/>
  </g>

  <!-- central cloud emblem -->
  <g filter="url(#soft)" transform="translate(600,150)">
    <g transform="translate(-140,-70)">
      <path fill="url(#cloud)" d="M70 120
        a48 48 0 0 1 6 -95
        a58 58 0 0 1 112 -8
        a46 46 0 0 1 40 103
        z"/>
      <!-- server -->
      <rect x="118" y="70" width="52" height="14" rx="3" fill="#0a4fd6"/>
      <rect x="118" y="88" width="52" height="14" rx="3" fill="#1e88ff"/>
      <circle cx="126" cy="77" r="3" fill="#ffffff"/>
      <circle cx="126" cy="95" r="3" fill="#ffffff"/>
      <!-- gear -->
      <g transform="translate(96,86)" fill="#0a4fd6">
        <circle cx="0" cy="0" r="15"/>
        <circle cx="0" cy="0" r="6" fill="#ffffff"/>
        <g>
          <rect x="-3" y="-22" width="6" height="10" rx="2"/>
          <rect x="-3" y="12" width="6" height="10" rx="2"/>
          <rect x="-22" y="-3" width="10" height="6" rx="2"/>
          <rect x="12" y="-3" width="10" height="6" rx="2"/>
        </g>
      </g>
    </g>
  </g>

  <!-- title -->
  <text x="600" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="1">Technology Education Center</text>
  <text x="600" y="292" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#cfe1ff" letter-spacing="6">CLOUD2BR &#183; LEARN &#183; BUILD &#183; APPLY</text>
</svg>
